version: '3.8'

services:
  campus-postgres:
    image: postgres:15-alpine
    container_name: campus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: your_db

  campus-backend:
    build: ./backend
    container_name: campus-backend
    ports:
      - "8000:8000"
    depends_on:
      - campus-postgres

  campus-frontend:
    build: ./frontend
    container_name: campus-frontend
    ports:
      - "3000:3000"
    depends_on:
      - campus-backend